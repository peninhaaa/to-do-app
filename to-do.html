<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lista de Tarefas</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #3a3a3a);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

h1 {
  color: white;
  margin-bottom: 20px;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 420px;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
  position: relative;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  text-align: center;
}

button {
  background: black;
  color: white;
  cursor: pointer;
}

/* TAREFAS */
.task {
  background: #cfcfcf;
  padding: 12px;
  margin-top: 12px;
  border-left: 5px solid gray;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.alta { border-color: red; }
.media { border-color: orange; }
.baixa { border-color: green; }

.concluida {
  text-decoration: line-through;
  opacity: 0.6;
}

/* ÍCONE */
.icon {
  position: absolute;
  top: 15px;
  right: 15px;
  cursor: pointer;
}

/* FILTRO */
.filtro-box {
  display: none;
  position: absolute;
  top: 0;
  left: 450px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 160px;
  border: 1px solid #ccc;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<h1>LISTA DE TAREFAS</h1>

<div class="box">

  <!-- ⚙️ -->
  <div class="icon" onclick="toggleFiltro()">⚙️</div>

  <!-- FILTRO (SEM REPETIÇÃO) -->
  <div class="filtro-box" id="filtroBox">
    <label>Status:</label>
    <select id="filtroStatus" onchange="render()">
      <option value="todas">Todas</option>
      <option value="pendentes">Pendentes</option>
      <option value="concluidas">Concluídas</option>
    </select>
  </div>

  <!-- MATÉRIAS -->
  <select id="materia">
    <option>Programação</option>
    <option>Prompt de IA</option>
    <option>Prototipagem</option>
    <option>Interface do Usuário</option>
    <option>Inglês</option>
  </select>

  <!-- TAREFA -->
  <input type="text" id="tarefa" placeholder="Digite sua tarefa">

  <!-- PRIORIDADE -->
  <select id="prioridade">
    <option value="alta">Alta</option>
    <option value="media">Média</option>
    <option value="baixa">Baixa</option>
  </select>

  <!-- DATA -->
  <input type="date" id="data">

  <!-- HORÁRIO -->
  <input type="time" id="hora">

  <button onclick="addTask()">Adicionar</button>

  <!-- LISTA -->
  <div id="lista"></div>

</div>

<script>
let tarefas = [
  {
    texto: "Estudar Interface do Usuário",
    prioridade: "media",
    data: "2026-04-16",
    hora: "14:00",
    materia: "Interface do Usuário",
    concluida: false
  },
  {
    texto: "Praticar Inglês",
    prioridade: "alta",
    data: "2026-04-17",
    hora: "15:00",
    materia: "Inglês",
    concluida: false
  }
];

function addTask() {
  let texto = document.getElementById("tarefa").value;
  let prioridade = document.getElementById("prioridade").value;
  let data = document.getElementById("data").value;
  let hora = document.getElementById("hora").value;
  let materia = document.getElementById("materia").value;

  if (!texto) return alert("Digite uma tarefa!");

  tarefas.push({
    texto,
    prioridade,
    data,
    hora,
    materia,
    concluida: false
  });

  render();
}

function render() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let status = document.getElementById("filtroStatus").value;

  tarefas.forEach((t, i) => {

    if (status === "pendentes" && t.concluida) return;
    if (status === "concluidas" && !t.concluida) return;

    let div = document.createElement("div");
    div.className = "task " + t.prioridade;

    if (t.concluida) div.classList.add("concluida");

    div.innerHTML = `
      <div>
        <strong>${t.texto}</strong><br>
        <small>${t.materia} | ${t.data} ${t.hora}</small>
      </div>
      <div>
        <button onclick="toggle(${i})">✔</button>
        <button onclick="del(${i})">🗑</button>
      </div>
    `;

    lista.appendChild(div);
  });
}

function toggle(i) {
  tarefas[i].concluida = !tarefas[i].concluida;
  render();
}

function del(i) {
  tarefas.splice(i, 1);
  render();
}

function toggleFiltro() {
  let box = document.getElementById("filtroBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

render();
</script>

</body>
</html>
